services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dinamo
      POSTGRES_PASSWORD: dinamo
      POSTGRES_DB: dinamo_marketing
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dinamo -d dinamo_marketing"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dinamo:dinamo@db:5432/dinamo_marketing
      DATABASE_URL_SYNC: postgresql://dinamo:dinamo@db:5432/dinamo_marketing
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api/app:/app/app
      - ./mock-data:/app/mock-data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dinamo:dinamo@db:5432/dinamo_marketing
      DATABASE_URL_SYNC: postgresql://dinamo:dinamo@db:5432/dinamo_marketing
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api/app:/app/app
      - ./mock-data:/app/mock-data
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4

  celery-beat:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dinamo:dinamo@db:5432/dinamo_marketing
      DATABASE_URL_SYNC: postgresql://dinamo:dinamo@db:5432/dinamo_marketing
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api/app:/app/app
      - ./mock-data:/app/mock-data
    command: celery -A app.tasks.celery_app beat --loglevel=info

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      VITE_PORT: "3000"
      VITE_API_URL: "http://api:8000"
    volumes:
      - ./dashboard/src:/app/src
      - ./dashboard/index.html:/app/index.html
    depends_on:
      - api

volumes:
  pgdata:
