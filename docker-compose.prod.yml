services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shiftonezero
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: shiftonezero
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftonezero -d shiftonezero"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192M
    restart: unless-stopped

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3301:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://shiftonezero:${DB_PASSWORD}@db:5432/shiftonezero
      DATABASE_URL_SYNC: postgresql://shiftonezero:${DB_PASSWORD}@db:5432/shiftonezero
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SOZ_USE_MOCK_APIS: "true"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:-}
      RATE_LIMIT_ENABLED: "true"
      LOG_FORMAT: "json"
      LOG_LEVEL: "INFO"
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: "production"
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://shiftonezero.xyler.ai}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./mock-data:/app/mock-data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  celery-worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://shiftonezero:${DB_PASSWORD}@db:5432/shiftonezero
      DATABASE_URL_SYNC: postgresql://shiftonezero:${DB_PASSWORD}@db:5432/shiftonezero
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SOZ_USE_MOCK_APIS: "true"
      LOG_FORMAT: "json"
      LOG_LEVEL: "INFO"
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: "production"
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://shiftonezero.xyler.ai}
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping", "--timeout", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./mock-data:/app/mock-data
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  celery-beat:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://shiftonezero:${DB_PASSWORD}@db:5432/shiftonezero
      DATABASE_URL_SYNC: postgresql://shiftonezero:${DB_PASSWORD}@db:5432/shiftonezero
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SOZ_USE_MOCK_APIS: "true"
      LOG_FORMAT: "json"
      LOG_LEVEL: "INFO"
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://shiftonezero.xyler.ai}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./mock-data:/app/mock-data
    command: celery -A app.tasks.celery_app beat --loglevel=info
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:3300:80"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped

volumes:
  pgdata:
