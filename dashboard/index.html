<!DOCTYPE html>
<html lang="hr">

    <meta charset="UTF-8" />

    <!-- PWA Theme -->

    <meta name="color-scheme" content="light" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta property="og:type" content="website" />

    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body class="bg-studio-bg text-studio-text-primary font-body" style="font-family: 'Inter', sans-serif; background: #F5F9FF; color: #0F172A;">

    <!-- Auto-reload on new deploy: inline so it works even before new JS bundles load -->
    <script>
      if('serviceWorker' in navigator){var _r=false;navigator.serviceWorker.addEventListener('controllerchange',function(){if(!_r){_r=true;window.location.reload()}})}
    </script>

    <noscript>
      <div style="text-align:center;padding:3rem;font-family:Inter,sans-serif;color:#475569;background:#F5F9FF;min-height:100vh;display:flex;align-items:center;justify-content:center;">
        <div>
          <h1 style="color:#0F172A;">ShiftOneZero Marketing Platforma</h1>
          <p>JavaScript je potreban za rad ove aplikacije.</p>
        </div>
      </div>
